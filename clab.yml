name: workspace
prefix: "clab"

mgmt:
  network: netlab_mgmt
  ipv4-subnet: 192.168.121.0/24
  # Note: 'start' not validated
topology:
  nodes:
    r1:
      mgmt-ipv4: 192.168.121.101
      kind: linux
      restart-policy: 'no'
      image: python:3.13-alpine
      runtime: docker
      binds:
      - clab_files/r1/hosts:/etc/hosts
