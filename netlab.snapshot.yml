      - replace_global_as
      vrf:
        import: _r_import
        router_id:
          type: ipv4
          use: id
    community:
      ebgp:
      - standard
      ibgp:
      - standard
      - extended
    config_after:
    - routing
    - ospf
    - isis
    - eigrp
    - ripv2
    ebgp_role: external
    features:
      activate_af: Can control activation of individual address families
      community: Granular BGP community propagation
      confederation: BGP confederations
      import: Import routes from other routing protocols
      ipv6_lla: Can run EBGP sessions over IPv6 link-local addresses
      local_as: Supports local-as functionality
      local_as_ibgp: Can use local-as to create IBGP sesssion
      rfc8950: Can run IPv4 AF over regular IPv6 EBGP session
      vrf_local_as: Supports local-as within a VRF
    hooks:
    - normalize
    next_hop_self: true
    no_propagate:
      advertise_roles: null
      as_list: null
      confederation: null
      ebgp_role: null
      rr_list: null
    supported_on:
      arubacx: true
      asav: true
      bird: true
      cat8000v: true
      csr: true
      cumulus: true
      cumulus_nvue: true
      dellos10: true
      eos: true
      frr: true
      iol: true
      ioll2: true
      ios: true
      iosv: true
      iosvl2: true
      iosxr: true
      junos: true
      none: true
      nxos: true
      routeros: true
      routeros7: true
      sonic: true
      srlinux: true
      sros: true
      srsim: true
      unknown: true
      vjunos-router: true
      vjunos-switch: true
      vmx: true
      vptx: true
      vsrx: true
      vyos: true
    transform_after:
    - vlan
    warnings:
      igp_list:
      - ospf
      - eigrp
      - isis
      - ripv2
      missing_igp: true
  const:
    MAX_NODE_ID: 150
    ifname:
      maxlength: 255
      neighbors: 5
    multi_provider:
    - libvirt
    - clab
    routing_protocols:
    - bgp
    - connected
    - eigrp
    - isis
    - ospf
    - ripv2
    - static
    vrf_igp_protocols:
    - connected
    - ospf
    - isis
    - ripv2
  daemons:
    bird:
      clab:
        build: https://netlab.tools/netlab/clab/#netlab-clab-build
        features:
          initial:
            roles:
            - host
            - router
        group_vars:
          docker_shell: bash -il
          netlab_show_command:
          - birdc
          - show $@
        image: netlab/bird:latest
      daemon_config:
        bgp: /etc/bird/bgp.mod.conf
        bird: /etc/bird/bird.conf
        ospf: /etc/bird/ospf.mod.conf
        routing: /etc/bird/routing.mod.conf
      description: BIRD Internet Routing Daemon
      features:
        bfd: true
        bgp:
          activate_af: true
          community:
            2octet:
            - standard
            extended:
