      description: containerlab with Docker
      kmods:
        lag:
        - bonding
        mpls:
        - mpls-router
        - mpls-iptunnel
        sr:
        - mpls-router
        - mpls-iptunnel
        vrf:
        - vrf
        vxlan:
        - vxlan
        - udp_tunnel
        - ip6_udp_tunnel
