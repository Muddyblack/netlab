      bird: true
      cat8000v: true
      csr: true
      cumulus: true
      dellos10: true
      eos: true
      frr: true
      iol: true
      ioll2: true
      ios: true
      iosv: true
      iosvl2: true
      junos: true
      none: true
      nxos: true
      srlinux: true
      sros: true
      srsim: true
      unknown: true
      vjunos-router: true
      vjunos-switch: true
      vmx: true
      vptx: true
      vsrx: true
      vyos: true
