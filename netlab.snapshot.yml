          use: id
        rr_list: list
        sessions:
          ipv4:
            _subtype: bgp_session_type
            type: list
          ipv6:
            _subtype: bgp_session_type
            type: list
      interface:
        local_as: asn
        replace_global_as: bool
      link:
        advertise:
          _intra_as: true
          type: bool
      node:
        activate:
          ipv4:
            _subtype: bgp_session_type
            type: list
          ipv6:
            _subtype: bgp_session_type
            type: list
        advertise_loopback: bool
        as:
          _required: true
          type: asn
        community:
          _alt_types:
          - str
          - BoxList
          ebgp:
          - standard
          - extended
          - large
          - 2octet
          ibgp:
          - standard
          - extended
          - large
          - 2octet
        import: _r_import
        local_as: asn
        next_hop_self: bool
        originate:
          _subtype:
            named: true
            type: ipv4
            use: subnet_prefix
          type: list
        replace_global_as: bool
        router_id:
          type: ipv4
          use: id
        rr: bool
        rr_cluster_id:
          type: ipv4
          use: id
        sessions:
          ipv4:
            _subtype: bgp_session_type
            type: list
          ipv6:
            _subtype: bgp_session_type
            type: list
      node_copy:
