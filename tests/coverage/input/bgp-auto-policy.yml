---
message: |
  This topology is a regression test for #3284 and checks that the routing
  module is inserted in the correct place in the node module list.

plugin: [ bgp.policy ]
module: [ bgp ]

provider: clab
defaults.device: eos
defaults.devices.eos.clab:
  image: none
  group_vars.netlab_config_mode: sh

nodes:
  dut:
    bgp.as: 65000
    id: 1
    bgp.locpref: 17
  x1:
    bgp.as: 65100

links:
- dut:
  x1:
