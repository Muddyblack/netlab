# Regression test for #671
#
defaults.device: eos
defaults.modules.warnings.no_nodes: False

nodes:
  h:
    device: linux
  s1:
    module: [vlan]
  s2:
    module: [vlan, gateway]

vlans:
  blue:
    gateway: true

links:
- h:
  s1:
  gateway: true
- h:
  s1:
  vlan.access: blue
- s1:
  s2:
  vlan.trunk: [blue]
