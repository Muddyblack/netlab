message: |
  This test checks the custom Vagrant templates

plugin: [ files ]
provider: libvirt

defaults.netlab.integration:
  skip: [ up, initial ]
  validate: bash validate.sh

nodes.x.device: frr

files:
  validate.sh: |
    #!/bin/bash
    set -e
    if grep "### Custom template" Vagrantfile >/dev/null; then
      echo "Custom Vagrantfile template was used"
    else
      echo "We did not use custom Vagrantfile template"
      exit 1
    fi
    if grep "### Custom device" Vagrantfile >/dev/null; then
      echo "Custom Vagrant device template was used"
    else
      echo "We did not use custom Vagrant device template"
      exit 1
    fi
