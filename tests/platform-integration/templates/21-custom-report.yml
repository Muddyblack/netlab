message: |
  This test checks a custom report

plugin: [ files ]
provider: clab

defaults.netlab.integration:
  skip: [ up ]
  initial: netlab report custom custom.txt
  validate: bash validate.sh

nodes.x.device: frr

files:
  validate.sh: |
    #!/bin/bash
    set -e
    if grep "### Custom report" custom.txt >/dev/null; then
      echo "Custom report was created"
    else
      echo "We failed to create a custom report"
      exit 1
    fi
