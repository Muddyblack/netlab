message: |
  This test checks the custom containerlab configuration templates

plugin: [ files ]
provider: clab

defaults.netlab.integration:
  skip: [ up, initial ]
  validate: bash validate.sh

nodes.x.device: frr

files:
  validate.sh: |
    #!/bin/bash
    set -e
    if grep "### Custom template" clab.yml >/dev/null; then
      echo "Custom containerlab template was used"
    else
      echo "We did not use custom containerlab template"
      exit 1
    fi
