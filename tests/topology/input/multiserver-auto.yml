---
# Test automatic assignment and replication in multiserver plugin
#
provider: clab
plugin: [ multiserver ]

multiserver:
  servers:
    srv1:
      host: 192.168.128.1
    srv2:
      host: 192.168.128.2
  assignment: auto
  replicate: [ mon_srv ]

groups:
  g1:
    members: [ g1_n1, g1_n2 ]
  g2:
    members: [ g2_n1, g2_n2 ]

nodes:
  g1_n1:
    device: eos
  g1_n2:
    device: eos
  g2_n1:
    device: eos
  g2_n2:
    device: eos
  mon_srv:
    device: eos

links:
  # Internal links within group 1
- g1_n1:
  g1_n2:
  # Internal links within group 2
- g2_n1:
  g2_n2:
  # Connected to replicated node
- mon_srv:
  g1_n1:
- mon_srv:
  g2_n1:
