---
_multiserver:
  assignment:
    g1_n1: 1
    g1_n2: 1
    g2_n1: 2
    g2_n2: 2
  replicated:
  - mon_srv
  server_map:
    1:
      host: 192.168.128.1
      id: 1
    2:
      host: 192.168.128.2
      id: 2
groups:
  g1:
    members:
    - g1_n1
    - g1_n2
  g2:
    members:
    - g2_n1
    - g2_n2
input:
- topology/input/multiserver-auto.yml
- package:topology-defaults.yml
links:
- _linkname: links[1]
  _ms:
    cross: false
    servers:
    - 1
  interfaces:
  - ifindex: 1
    ifname: Ethernet1
    ipv4: 10.1.0.1/30
    node: g1_n1
  - ifindex: 1
    ifname: Ethernet1
    ipv4: 10.1.0.2/30
    node: g1_n2
  linkindex: 1
  node_count: 2
  prefix:
    ipv4: 10.1.0.0/30
  type: p2p
- _linkname: links[2]
  _ms:
    cross: false
    servers:
    - 2
  interfaces:
  - ifindex: 1
    ifname: Ethernet1
    ipv4: 10.1.0.5/30
    node: g2_n1
  - ifindex: 1
    ifname: Ethernet1
    ipv4: 10.1.0.6/30
    node: g2_n2
  linkindex: 2
  node_count: 2
  prefix:
    ipv4: 10.1.0.4/30
  type: p2p
- _linkname: links[3]
  _ms:
    cross: false
    servers:
    - 1
  interfaces:
  - ifindex: 1
    ifname: Ethernet1
    ipv4: 10.1.0.10/30
    node: mon_srv
  - ifindex: 2
    ifname: Ethernet2
    ipv4: 10.1.0.9/30
    node: g1_n1
  linkindex: 3
  node_count: 2
  prefix:
    ipv4: 10.1.0.8/30
  type: p2p
- _linkname: links[4]
  _ms:
    cross: false
    servers:
    - 2
  interfaces:
  - ifindex: 2
    ifname: Ethernet2
    ipv4: 10.1.0.14/30
    node: mon_srv
  - ifindex: 2
    ifname: Ethernet2
    ipv4: 10.1.0.13/30
    node: g2_n1
  linkindex: 4
  node_count: 2
  prefix:
    ipv4: 10.1.0.12/30
  type: p2p
multiserver:
  assignment: auto
  output_dir: server-{server_id}
  replicate:
  - mon_srv
  servers:
  - host: 192.168.128.1
    id: 1
  - host: 192.168.128.2
    id: 2
  vxlan:
    dev: ens33
    dstport: 4789
    vni_base: 10000
name: input
nodes:
  g1_n1:
    af:
      ipv4: true
    box: ceos:4.34.2F
    clab:
      env:
        CLAB_MGMT_VRF: management
        INTFTYPE: et
      kind: ceos
    device: eos
    hostname: clab-input-g1_n1
    id: 1
    interfaces:
    - clab:
        name: et1
      ifindex: 1
      ifname: Ethernet1
      ipv4: 10.1.0.1/30
      linkindex: 1
      mac_address: caf0.0001.0001
      name: g1_n1 -> g1_n2
      neighbors:
      - ifname: Ethernet1
        ipv4: 10.1.0.2/30
        node: g1_n2
      type: p2p
    - clab:
        name: et2
      ifindex: 2
      ifname: Ethernet2
      ipv4: 10.1.0.9/30
      linkindex: 3
      mac_address: caf0.0001.0002
      name: g1_n1 -> mon_srv
      neighbors:
      - ifname: Ethernet1
        ipv4: 10.1.0.10/30
        node: mon_srv
      type: p2p
    loopback:
      ifindex: 0
      ifname: Loopback0
      ipv4: 10.0.0.1/32
      neighbors: []
      type: loopback
      virtual_interface: true
    mgmt:
      ifname: Management0
      ipv4: 192.168.121.101
      mac: ca:fe:00:01:00:00
    name: g1_n1
    role: router
  g1_n2:
    af:
      ipv4: true
    box: ceos:4.34.2F
    clab:
      env:
        CLAB_MGMT_VRF: management
        INTFTYPE: et
      kind: ceos
    device: eos
    hostname: clab-input-g1_n2
    id: 2
    interfaces:
    - clab:
        name: et1
      ifindex: 1
      ifname: Ethernet1
      ipv4: 10.1.0.2/30
      linkindex: 1
      mac_address: caf0.0002.0001
      name: g1_n2 -> g1_n1
      neighbors:
      - ifname: Ethernet1
        ipv4: 10.1.0.1/30
        node: g1_n1
      type: p2p
    loopback:
      ifindex: 0
      ifname: Loopback0
      ipv4: 10.0.0.2/32
      neighbors: []
      type: loopback
      virtual_interface: true
    mgmt:
      ifname: Management0
      ipv4: 192.168.121.102
      mac: ca:fe:00:02:00:00
    name: g1_n2
    role: router
  g2_n1:
    af:
      ipv4: true
    box: ceos:4.34.2F
    clab:
      env:
        CLAB_MGMT_VRF: management
        INTFTYPE: et
      kind: ceos
    device: eos
    hostname: clab-input-g2_n1
    id: 3
    interfaces:
    - clab:
        name: et1
      ifindex: 1
      ifname: Ethernet1
      ipv4: 10.1.0.5/30
      linkindex: 2
      mac_address: caf0.0003.0001
      name: g2_n1 -> g2_n2
      neighbors:
      - ifname: Ethernet1
        ipv4: 10.1.0.6/30
        node: g2_n2
      type: p2p
    - clab:
        name: et2
      ifindex: 2
      ifname: Ethernet2
      ipv4: 10.1.0.13/30
      linkindex: 4
      mac_address: caf0.0003.0002
      name: g2_n1 -> mon_srv
      neighbors:
      - ifname: Ethernet2
        ipv4: 10.1.0.14/30
        node: mon_srv
      type: p2p
    loopback:
      ifindex: 0
      ifname: Loopback0
      ipv4: 10.0.0.3/32
      neighbors: []
      type: loopback
      virtual_interface: true
    mgmt:
      ifname: Management0
      ipv4: 192.168.121.103
      mac: ca:fe:00:03:00:00
    name: g2_n1
    role: router
  g2_n2:
    af:
      ipv4: true
    box: ceos:4.34.2F
    clab:
      env:
        CLAB_MGMT_VRF: management
        INTFTYPE: et
      kind: ceos
    device: eos
    hostname: clab-input-g2_n2
    id: 4
    interfaces:
    - clab:
        name: et1
      ifindex: 1
      ifname: Ethernet1
      ipv4: 10.1.0.6/30
      linkindex: 2
      mac_address: caf0.0004.0001
      name: g2_n2 -> g2_n1
      neighbors:
      - ifname: Ethernet1
        ipv4: 10.1.0.5/30
        node: g2_n1
      type: p2p
    loopback:
      ifindex: 0
      ifname: Loopback0
      ipv4: 10.0.0.4/32
      neighbors: []
      type: loopback
      virtual_interface: true
    mgmt:
      ifname: Management0
      ipv4: 192.168.121.104
      mac: ca:fe:00:04:00:00
    name: g2_n2
    role: router
  mon_srv:
    af:
      ipv4: true
    box: ceos:4.34.2F
    clab:
      env:
        CLAB_MGMT_VRF: management
        INTFTYPE: et
      kind: ceos
    device: eos
    hostname: clab-input-mon_srv
    id: 5
    interfaces:
    - clab:
        name: et1
      ifindex: 1
      ifname: Ethernet1
      ipv4: 10.1.0.10/30
      linkindex: 3
      mac_address: caf0.0005.0001
      name: mon_srv -> g1_n1
      neighbors:
      - ifname: Ethernet2
        ipv4: 10.1.0.9/30
        node: g1_n1
      type: p2p
    - clab:
        name: et2
      ifindex: 2
      ifname: Ethernet2
      ipv4: 10.1.0.14/30
      linkindex: 4
      mac_address: caf0.0005.0002
      name: mon_srv -> g2_n1
      neighbors:
      - ifname: Ethernet2
        ipv4: 10.1.0.13/30
        node: g2_n1
      type: p2p
    loopback:
      ifindex: 0
      ifname: Loopback0
      ipv4: 10.0.0.5/32
      neighbors: []
      type: loopback
      virtual_interface: true
    mgmt:
      ifname: Management0
      ipv4: 192.168.121.105
      mac: ca:fe:00:05:00:00
    name: mon_srv
    role: router
plugin:
- multiserver
provider: clab
