---
message: |
  This topology tests the "start lab with configuration reload" functionality.
  You should:

  * Start the lab with "netlab up"
  * Save the configuration with "netlab collect -o saved"
  * Stop the lab with "netlab down"
  * Restart the lab with "netlab up --snapshot --reload-config saved"
  * Validate the results with "netlab validate"

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
defaults.paths.prepend.plugin: [ "topology:../plugin" ]

module: [ ospf ]

plugin: [ files, adjust_test ]

files:
  start_and_save.sh: |
    set -e
    netlab up --snapshot
    netlab collect -o saved -l dut
    netlab down
  reload.sh: |
    set -e
    netlab up --snapshot --no-config
    netlab config -l dut --reload saved
    netlab initial -l x1 --no-message

defaults.netlab.integration:
  up: bash start_and_save.sh                    # Go through up/collect/down/restart cycle
  initial: bash reload.sh                       # Try to reload device configuration

_adjust:
- nodes: [ dut ]
  features: [ initial.reload ]
  error: We cannot reload device configuration for the tested device

groups:
  probes:
    device: frr
    provider: clab
    members: [ x1 ]

nodes:
  dut:
    role: router
  x1:

links:
- dut:
  x1:
  mtu: 1500

validate:
  adj:
    description: Check OSPF adjacencies
    wait: ospfv2_adj_p2p
    wait_msg: Waiting for OSPF adjacency process to complete
    nodes: [ x1 ]
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
