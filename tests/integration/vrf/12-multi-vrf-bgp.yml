---
message: |
  The device under test has two VRFs with two interfaces in each VRF.
  Routers are attached to those interfaces and run BGP with device under test.
  Assuming the multi-vrf test case succeeded, this one adds BGP routing with
  CE routers.

  * r1 and r2 should be able to ping each other
  * r3 and r4 should be able to ping each other
  * r1 should not be able to reach r3

  The test also checks whether DUT unnecessarily enables IPv6 AF over IPv4
  EBGP sessions

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
defaults.paths.prepend.plugin: [ "topology:../plugin" ]
plugin: [ adjust_test ]

addressing:
  loopback:
    ipv6: 2001:db8:1::/48

prefix:
  orig_beacon.ipv4: 172.42.42.0/24

groups:
  _auto_create: True
  ce:
    members: [ r1, r2, r3, r4 ]
    module: [ bgp ]
    device: eos
    provider: clab
    config: [ bgp-xact ]
    netlab_phy_control: False
  pe:
    members: [ dut ]
    module: [ vrf, bgp ]
    bgp.as: 65000

vrfs:
  red:
    links:
    - dut.bgp.advertise: true
      r1:
    - dut-r2
  blue:
    links: [ dut-r3, dut-r4 ]

nodes:
  dut:
    vrfs:
      red.bgp:
        import: {}
        originate: orig_beacon
  r1:
    bgp.as: 65101
    id: 11
  r2:
    bgp.as: 65102
    id: 12
  r3:
    bgp.as: 65103
    id: 23
  r4:
    bgp.as: 65104
    id: 24

_adjust:
- nodes: [ dut ]              # Remove 'bgp.import' if the device does not support VRF imports
  features:
  - key: bgp.import
    value: vrf
  warning: >-
    {device} does not support configurable redistribution into VRF BGP instances
  remove:
  - nodes.dut.vrfs.red.bgp.import
- nodes: [ dut ]              # Remove 'bgp.advertise' if the device does not support it
  check_mode: and
  features: [ bgp.advertise, routing.static.discard, routing.static.vrf ]
  warning: The BGP configuration template for {device} does not support VRF bgp.originate attribute
  remove:
  - nodes.dut.vrfs.red.bgp.originate
  - validate.pfx_red_orig

validate:
  session:
    description: Check EBGP sessions with DUT
    wait: ebgp_session
    wait_msg: Waiting for BGP sessions to start
    nodes: [ r1, r2, r3, r4 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
    stop_on_error: true
  pfx_red:
    description: Check BGP prefix on R1
    wait: bgp_scan_long
    wait_msg: Waiting for BGP convergence
    fail: DUT is not propagating BGP prefixes between R1 and R2
    nodes: [ r1 ]
    plugin: bgp_prefix(nodes.r2.loopback.ipv4)
  pfx_red_adv:
    description: Check connected subnet as BGP prefix on R1
    wait: bgp_v4_redist
    wait_msg: Waiting for BGP convergence
    level: warning
    fail: DUT is not advertising connected subnets into VRF BGP
    nodes: [ r2 ]
    plugin: bgp_prefix(nodes.r1.interfaces[0].ipv4)
  pfx_red_orig:
    description: Check originated BGP prefix on R1
    wait: bgp_v4_redist
    wait_msg: Waiting for BGP convergence
    level: warning
    fail: DUT is not originating a BGP prefix into VRF BGP instance
    nodes: [ r2 ]
    plugin: bgp_prefix(prefix.orig_beacon.ipv4)
  pfx_blue:
    description: Check BGP prefix on R3
    wait: bgp_scan_long
    wait_msg: Waiting for BGP convergence
    fail: DUT is not propagating BGP prefixes between R3 and R4
    nodes: [ r3 ]
    plugin: bgp_prefix(nodes.r4.loopback.ipv4)
  pfx_blue_c:
    description: Check connected subnet as BGP prefix on R4
    wait: bgp_v4_redist
    wait_msg: Waiting for BGP convergence
    fail: DUT is not redistributing connected subnets into VRF BGP
    nodes: [ r4 ]
    plugin: bgp_prefix(nodes.r3.interfaces[0].ipv4)
  ebgp_6o4:
    description: Check for invalid activation of IPv6 AF over IPv4 EBGP sessions on DUT
    nodes: [ r1, r2, r3, r4 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut',activate='ipv6',state='missing')
    stop_on_error: true
  red:
    description: Ping-based reachability test in VRF red
    nodes: [ r2 ]
    plugin: ping('r1',src=nodes.r2.loopback.ipv4)
  blue:
    description: Ping-based reachability test in VRF blue
    nodes: [ r3 ]
    plugin: ping('r4')
  inter_vrf:
    description: Ping-based isolation test between blue and red VRF
    nodes: [ r1 ]
    plugin: ping('r4',expect='fail')
