---
message: |
  The device under test is an EVPN PE-device bridging two VLANs over VXLAN running
  on IPv6 transport. The other EVPN PE-device is an EOS container.

  Both VLANs are using the same IP prefix to identify potential inter-VLAN
  leaking.

  * h1 and h2 should be able to ping each other
  * h3 and h4 should be able to ping each other
  * h1 should not be able to reach h3 or h4

  Please note it might take a while for the lab to work due to STP learning
  phase

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
plugin: [ fix_mtu ]

addressing:
  loopback.ipv6: 2001:db8:cafe::/48
  loopback.ipv4: False
  p2p.ipv6: 2001:db8:1::/48
  p2p.ipv4: False

defaults.vxlan.use_v6_vtep: true

module: [ vlan, vxlan, ospf, bgp, evpn ]

groups:
  _auto_create: True
  hosts:
    members: [ h1, h2, h3, h4 ]
    device: linux
    provider: clab
  switches:
    members: [ s1, s2 ]
  x_switches:
    module: [ ospf, bgp, evpn ]
    members: [ probe ]
    device: eos
    provider: clab

bgp.as: 65000

vlans:
  red:
    mode: bridge
    prefix:
      ipv4: 172.31.1.0/24
    links: [ s1-h1, s2-h2 ]
  blue:
    mode: bridge
    prefix:
      ipv4: 172.31.1.0/24
    links: [ s1-h3, s2-h4 ]

links:
- s1:
  s2:
  mtu: 1600
- s1-probe
- s2-probe

validate:
  ospf_adj_s1:
    description: Check OSPFv3 adjacencies with S1
    wait: ospfv3_adj_p2p
    nodes: [ probe ]
    wait_msg: Waiting for OSPFv3 adjacency process to complete
    plugin: ospf6_neighbor(nodes.s1.ospf.router_id)
  ospf_adj_s2:
    description: Check OSPFv3 adjacencies with S2
    wait: ospfv3_adj_p2p
    nodes: [ probe ]
    wait_msg: Waiting for OSPFv3 adjacency process to complete
    plugin: ospf6_neighbor(nodes.s2.ospf.router_id)

  ibgp_adj_s1:
    description: Check IBGP adjacencies with S1
    wait: ibgp_session
    nodes: [ probe ]
    wait_msg: Waiting for IBGP session
    plugin: bgp_neighbor(node.bgp.neighbors,'s1',af='ipv6')
  ibgp_adj_s2:
    description: Check IBGP adjacencies with S2
    wait: ibgp_session
    nodes: [ probe ]
    wait_msg: Waiting for IBGP session
    plugin: bgp_neighbor(node.bgp.neighbors,'s2',af='ipv6')

#  evpn_adj_s1:
#    description: Check EVPN AF on IBGP adjacencies with S1
#    nodes: [ probe ]
#    plugin: bgp_neighbor(node.bgp.neighbors,'s1',activate='evpn',af='ipv6')
#    stop_on_error: True
#  evpn_adj_s2:
#    description: Check EVPN AF on IBGP adjacencies with S2
#    nodes: [ probe ]
#    plugin: bgp_neighbor(node.bgp.neighbors,'s2',activate='evpn',af='ipv6')
#    stop_on_error: True

  ping_red:
    description: Ping-based reachability test in VLAN red
    wait_msg: Waiting for STP to wake up
    wait: ping_stp
    nodes: [ h1 ]
    plugin: ping('h2')
  ping_blue:
    description: Ping-based reachability test in VLAN blue
    wait_msg: We might have to wait a bit longer
    wait: vxlan_ping
    nodes: [ h3 ]
    plugin: ping('h4')
  inter_vlan:
    description: Ping-based reachability test between blue and red VLANs
    nodes: [ h1 ]
    devices: [ linux ]
    plugin: ping('h4',expect='fail')
