---
message: |
  The device under test is a VXLAN router-on-a-stick. This tests check
  VXLAN-to-VXLAN routing.

  * h1 and h2 should be able to ping each other

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
plugin: [ test.fixup, fix_mtu ]

groups:
  _auto_create: True
  hosts:
    members: [ h1, h2 ]
    device: linux
    provider: clab

vlans:
  red:
    vrf: tenant
    links: [ l2sw-h1 ]
    vni: 5000
  blue:
    vrf: tenant
    links: [ l2sw-h2 ]
    vni: 5001

vrfs:
  tenant:
    loopback: True
    ospf: False

nodes:
  dut:
    module: [ vlan, vxlan, ospf, vrf ]
    role: router
    vlans:                                      # Bring VLANs to ROS (until we agree on a better solution)
      red:
      blue:
  l2sw:
    module: [ vlan, vxlan, ospf ]
    vlan.mode: bridge
    device: frr
    provider: clab

links:
- dut:
  l2sw:
  mtu: 1600

validate:
  ospf_adj:
    description: Check OSPF adjacencies
    wait_msg: Waiting for OSPF adjacency process to complete
    wait: ospfv2_adj_p2p
    nodes: [ l2sw ]
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
    stop_on_error: True
  ping_gw:
    description: Host-to-router ping-based reachability tests
    wait_msg: Waiting for OSPF to do its magic
    wait: vxlan_ping
    nodes: [ h1, h2 ]
    plugin: ping(nodes.dut.vrfs.tenant.loopback_address.ipv4)
  ping_e2e:
    description: Host-to-host ping-based reachability tests
    wait_msg: We might have to wait a bit longer
    wait: ping
    nodes: [ h1 ]
    plugin: ping('h2')

_fixup:
  arubacx:
    nodes.l2sw.device: eos
    validate.warning:
      wait: 0
      level: warning
      fail: VXLAN-encapsulated ARP packets sent by Aruba CX have invalid IP packet length
    _delete:
      nodes.l2sw.provider:
