---
message: |
  Use this topology to test the origination and propagation
  of IPv4 prefixes.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]
defaults.paths.prepend.plugin: [ "topology:../plugin" ]
plugin: [ adjust_test ]

module: [ bgp ]

groups:
  probes:
    device: frr
    provider: clab
    members: [ x1, x2, r1 ]

defaults.bgp.as: 65000
defaults.interfaces.mtu: 1500

prefix:
  adv_beacon:
    ipv4: 172.42.43.0/24

nodes:
  dut:
    bgp.originate: [ 172.42.42.0/24 ]
    bgp.advertise: [ adv_beacon ]
    bgp.advertise_loopback: False
    loopback: True
    module: [ bgp, ospf ]
  dut2:
    bgp.as: 65001
    loopback: True
  x1:
    bgp.as: 65100
  x2:
    bgp.as: 65101
  r1:
    module: [ bgp, ospf ]

links:
- dut-r1
- dut-x1
- dut-x2
- dut:
  dut2:
  prefix.ipv4: 172.0.66.0/24
- dut:
  prefix.ipv4: 172.0.42.0/24
  bgp.advertise: True
- r1:
  prefix: adv_beacon
  bgp.advertise: False

defaults.devices.cisco8000v.netlab_validate.originate.wait: 80
defaults.devices.cisco8000v.netlab_validate.loopback.wait: 80

_adjust:
- nodes: [ dut ]              # Remove 'bgp.advertise' if the device does not support it
  features: [ bgp.advertise ]
  warning: The BGP configuration template for {device} does not support bgp.advertise attribute
  remove:
  - nodes.dut.bgp.advertise
  - validate.adv_ipv4

validate:
  ospf_adj:
    description: Check OSPF session with DUT
    wait: ospfv2_adj_p2p
    wait_msg: Wait for OSPF session to be established
    nodes: [ r1 ]
    plugin: ospf_neighbor(nodes.dut.ospf.router_id)
  bgp_adj:
    description: Check BGP sessions with DUT
    wait: ibgp_session
    wait_msg: Wait for BGP sessions to be established
    nodes: [ x1, x2, r1 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')
  originate:
    description: Check whether DUT originates the beacon prefix
    wait_msg: Wait for prefix origination and BGP convergence
    wait: bgp_v4_originate
    nodes: [ x1, x2, r1 ]
    plugin: bgp_prefix('172.42.42.0/24')
  loopback:
    description: Check whether DUT2 originates the loopback prefix
    wait_msg: Wait for prefix origination and BGP convergence
    wait: bgp_v4_originate
    nodes: [ x1, x2, r1 ]
    plugin: bgp_prefix('10.0.0.2/32')
  stub:
    description: Check whether DUT originates a stub prefix
    nodes: [ x1, x2, r1 ]
    plugin: bgp_prefix('172.0.42.0/24')
  suppress_lb:
    description: Check whether DUT suppresses the loopback prefix
    nodes: [ x1, x2, r1 ]
    plugin: bgp_prefix('10.0.0.1/32',state='missing')
  suppress_p2p:
    description: Check whether DUT originates an unwanted prefix on a P2P link
    nodes: [ x1, x2, r1 ]
    plugin: bgp_prefix('172.0.66.0/24',state='missing')
  adv_ipv4:
    description: Check whether DUT advertises OSPF prefix into BGP
    wait: bgp_scan_time
    wait_msg: Waiting for advertised OSPF prefix
    nodes: [ x1, x2 ]
    plugin: bgp_prefix(prefix.adv_beacon.ipv4)
