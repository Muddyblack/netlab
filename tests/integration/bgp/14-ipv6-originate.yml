---
message: |
  Use this topology to test the origination and propagation
  of IPv6 prefixes.

defaults.sources.extra: [ defaults-ipv6.yml, ../wait_times.yml, ../warnings.yml ]
defaults.paths.prepend.plugin: [ "topology:../plugin" ]
plugin: [ adjust_test ]

module: [ bgp ]

groups:
  probes:
    device: frr
    provider: clab
    members: [ x1, x2, r1 ]

prefix:
  adv_beacon:
    ipv6: 2001:db8:bad:1::/64
  orig_beacon:
    ipv6: 2001:db8:bad:2::/64

bgp.as: 65000
ospf.timers.hello: 1
ospf.timers.dead: 3

defaults.interfaces.mtu: 1500

nodes:
  dut:
    module: [ ospf, bgp ]
    bgp.advertise_loopback: False
    bgp.advertise: [ adv_beacon ]
    bgp.originate: [ orig_beacon ]
    loopback: True
  dut2:
    bgp.as: 65001
    loopback: True
  x1:
    bgp.as: 65100
  x2:
    bgp.as: 65101
  r1:
    module: [ ospf ]

links:
- dut-x1
- dut-x2
- dut-r1
- dut:
  dut2:
  prefix.ipv6: 2001:db8:cafe:e01::/64
- dut:
  prefix.ipv6: 2001:db8:cafe:e42::/64
  bgp.advertise: True
- r1:
  prefix: adv_beacon

_adjust:
- nodes: [ dut ]              # Remove 'bgp.advertise' if the device does not support it
  features: [ bgp.advertise ]
  warning: The BGP configuration template for {device} does not support bgp.advertise attribute
  remove:
  - nodes.dut.bgp.advertise
  - validate.adv_ipv6
- nodes: [ dut ]              # Remove 'bgp.originate' if the device does not support it
  features: [ bgp.advertise, routing.static.discard ]
  check_mode: and
  warning: The BGP configuration template for {device} does not support IPv6 prefixes in bgp.originate attribute
  remove:
  - nodes.dut.bgp.originate
  - validate.orig_ipv6
- nodes: [ dut ]
  features: [ ospf.timers ]
  remove:
  - nodes:ospf.timers

validate:
  s_dut:
    description: Check EBGP sessions with DUT
    wait: ebgp_session
    wait_msg: Waiting for EBGP session to be established
    nodes: [ x1, x2 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut',af='ipv6')
  ospf_adj:
    description: Check OSPFv3 session with DUT
    wait: ospfv3_adj_p2p
    wait_msg: Wait for OSPFv3 session to be established
    nodes: [ r1 ]
    plugin: ospf6_neighbor(nodes.dut.ospf.router_id)
  stub:
    description: Check whether DUT originates a stub prefix
    wait: bgp_v6_originate
    wait_msg: Waiting for the stub prefix to be originated and propagated
    nodes: [ x1, x2 ]
    plugin: bgp_prefix('2001:db8:cafe:e42::/64',af='ipv6')
  loopback:
    description: Check whether DUT2 originates the loopback prefix
    wait: bgp_v6_originate
    wait_msg: Waiting for the loopback prefix to be originated and propagated
    nodes: [ x1, x2 ]
    plugin: bgp_prefix(nodes.dut2.loopback.ipv6,af='ipv6')
  adv_ipv6:
    description: Check whether DUT advertises OSPFv3 prefix into BGP
    wait: bgp_v6_originate
    wait_msg: Waiting for advertised OSPF prefix
    nodes: [ x1, x2 ]
    plugin: bgp_prefix(prefix.adv_beacon.ipv6,af='ipv6')
  orig_ipv6:
    description: Check whether DUT originates an IPv6 prefix into BGP
    wait: bgp_v6_originate
    wait_msg: Waiting for advertised discard route
    nodes: [ x1, x2 ]
    plugin: bgp_prefix(prefix.orig_beacon.ipv6,af='ipv6')
  suppress_lb:
    description: Check whether DUT suppresses the loopback prefix
    nodes: [ x1, x2 ]
    plugin: bgp_prefix(nodes.dut.loopback.ipv6,state='missing',af='ipv6')
  suppress_p2p:
    description: Check whether DUT originates an unwanted prefix on a P2P link
    nodes: [ x1, x2 ]
    plugin: bgp_prefix('2001:db8:cafe:e01::/64',af='ipv6',state='missing')
