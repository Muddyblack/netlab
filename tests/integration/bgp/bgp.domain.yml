---
message: |
  Use this topology to test the BGP domain plugin, which allows multiple
  independent copies of the same autonomous system. This test verifies that
  routers with the same AS number but different BGP domains (site_A and
  site_B) do not establish IBGP sessions with each other, preventing
  unwanted IBGP adjacencies in MPLS/VPN scenarios.

module: [ bgp, ospf ]

defaults.device: eos
provider: clab
defaults.paths.prepend.plugin: [ "topology:../plugin" ]
plugin: [ bgp.session, bgp.domain, adjust_test ]

ospf.timers.hello: 1
ospf.timers.dead: 3

_adjust:
- nodes: [ pe1 ]
  features: [ ospf.timers ]
  remove:
  - nodes:ospf.timers

nodes:
  pe1:
    bgp.as: 65000
  pe2:
    bgp.as: 65000
  ce1:
    bgp.as: 65101
    bgp.domain: site_A
  ce2:
    bgp.as: 65101
    bgp.domain: site_B

links:
- pe1:
  ce1:
    bgp.allowas_in: True
- pe2:
  ce2:
    bgp.allowas_in: True
- pe1-pe2
