---
message: |
  Test RFC 9234 BGP roles on EBGP sessions: provider/customer and peer/peer
  sessions (including route-leak prevention), and strict-mode role mismatch
  handling when another session on the same router has incompatible roles.

plugin: [ bgp.policy ]
module: [ bgp ]

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]

groups:
  probes:
    device: frr
    provider: clab
    members: [ customer, peer, upstream, bad, good, legacy ]

defaults.bgp.as: 65000

nodes:
  dut:
    bgp.as: 65001
  customer:
    bgp.as: 65002
    loopback.ipv4: 172.16.2.1/32
  peer:
    bgp.as: 65003
    loopback.ipv4: 172.16.3.1/32
  upstream:
    bgp.as: 65004
    loopback.ipv4: 172.16.4.1/32
  bad:
    bgp.as: 65199
  good:
    bgp.as: 65198
    loopback.ipv4: 172.16.98.1/32
  legacy:
    bgp.as: 65197
    loopback.ipv4: 172.16.97.1/32

links:
- dut.bgp.role: customer          # Valid: custom-to-provider
  upstream.bgp.role: provider
- dut.bgp.role: provider          # Valid: provider-to-customer
  customer.bgp.role: customer
- dut.bgp.role: peer              # Valid: peer-to-peer
  peer.bgp.role: peer
- dut:                            # Strict role validation, fails due to role mismatch
    bgp.role:
      name: provider
      strict: true
  bad:
    bgp.role:
      name: peer
      strict: true
- dut:                            # Valid strict role validation
    bgp.role:
      name: provider
      strict: true
  good:
    bgp.role:
      name: customer
      strict: true
- dut.bgp.role: peer              # Legacy peer without a role
  legacy:

validate:
  valid_roles:
    description: Check expected EBGP sessions
    wait_msg: Waiting for EBGP session establishment
    wait: ebgp_session
    nodes: [ upstream, customer, peer ]
    devices: [ frr ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')

  session_good:
    description: Check that the provider/customer strict-mode session is established
    wait_msg: Waiting for EBGP session establishment
    wait: ebgp_session
    nodes: [ good ]
    devices: [ frr ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')

  session_legacy:
    description: Check that the legacy session (no role on neighbor) is established
    wait_msg: Waiting for EBGP session establishment
    wait: ebgp_session
    nodes: [ legacy ]
    devices: [ frr ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')

  wait:
    description: Wait a few seconds before checking the mismatched session
    wait: 5

  session_bad:
    description: Check that incompatible strict-mode roles prevent session establishment
    nodes: [ bad ]
    devices: [ frr ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut',state=['Idle','Active'])

  adv_customer:
    description: Check that the customer prefix is advertised to everyone
    wait: bgp_scan_time
    wait_msg: Waiting for BGP convergence
    nodes: [ good, peer, upstream, legacy ]
    devices: [ frr ]
    plugin: bgp_prefix(nodes.customer.loopback.ipv4)

  adv_good:
    description: Check that the other customer prefix is advertised to everyone
    wait: bgp_scan_time
    wait_msg: Waiting for BGP convergence
    nodes: [ customer, peer, upstream, legacy ]
    devices: [ frr ]
    plugin: bgp_prefix(nodes.customer.loopback.ipv4)

  adv_legacy:
    description: Check that the legacy prefix is advertised to customers
    wait: bgp_scan_time
    wait_msg: Waiting for BGP convergence
    nodes: [ good, customer ]
    devices: [ frr ]
    plugin: bgp_prefix(nodes.good.loopback.ipv4)

  adv_upstream:
    description: Check that the upstream prefix is advertised to customers
    wait: bgp_scan_time
    wait_msg: Waiting for BGP convergence
    nodes: [ customer, good ]
    devices: [ frr ]
    plugin: bgp_prefix(nodes.upstream.loopback.ipv4)

  blk_upstream:
    description: Check that upstream prefix is not leaked to the peer session
    nodes: [ peer, legacy ]
    devices: [ frr ]
    plugin: bgp_prefix(nodes.upstream.loopback.ipv4,state='missing')

  blk_legacy:
    description: Check that the legacy prefix is not advertised to peers or upstreams
    nodes: [ peer, upstream ]
    devices: [ frr ]
    plugin: bgp_prefix(nodes.legacy.loopback.ipv4,state='missing')
