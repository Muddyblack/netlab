---
message: |
  Use this topology to test the 'auto bgp bandwidth' functionality. The DUT has to copy
  interface bandwidth into BGP bandwidth community and propagate that on IBGP updates.

defaults.sources.extra: [ ../wait_times.yml, ../warnings.yml ]

defaults.paths.prepend.plugin: [ "topology:../plugin" ]
plugin: [ bgp.policy, adjust_test ]
module: [ bgp, ospf ]

groups:
  probes:
    device: frr
    provider: clab
    members: [ x1, x2 ]

nodes:
  dut:
    bgp.as: 65000
    id: 1
  x1:
    bgp.as: 65000
  x2:
    bgp.as: 65101
    module: [ bgp ]

ospf.timers.hello: 1
ospf.timers.dead: 3

_adjust:
- nodes: [ dut ]
  features: [ ospf.timers ]
  remove:
  - nodes:ospf.timers

links:
- dut:
  x1:
- bandwidth: 100000 # in Mbps, FRR max is 100000
  dut:
    bgp.bandwidth: auto
  x2:

validate:
  session:
    description: Check BGP sessions with DUT
    wait: ibgp_session
    nodes: [ x1, x2 ]
    plugin: bgp_neighbor(node.bgp.neighbors,'dut')

  prefix:
    description: Check for X2 prefix on X1
    wait: bgp_scan_long
    nodes: [ x1, x2 ]
    plugin: bgp_prefix(nodes.x2.loopback.ipv4)
