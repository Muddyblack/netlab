---
description: Nokia SR Linux container
# containerlab nokia_srlinux type enum (schemas/clab.schema.json)
clab_types:
  ixs-a1:
  ixr-d1:
  ixr-d2:
  ixr-d3:
  ixr-d2l:
  ixr-d3l:
  ixr-d4:
  ixr-d5:
  ixr-h2:
  ixr-h3:
  ixr-h4:
  ixr-h4-32d:
  ixr-h5:
  ixr-h5-64d:
  ixr-h5-64o:
  ixr-6:
  ixr-6e:
  ixr-10:
  ixr-10e:
  ixr-18e:
  sxr-1x-44s:
  sxr-1d-32d:
  sxr-1-32d:
  ixr-x1b:
  ixr-x3b:
  ixr-x4:
  ixr-x4-d:
mgmt_if: mgmt0
interface_name: ethernet-1/{ifindex}
loopback_interface_name: "lo0.{ifindex}"
group_vars:
  ansible_user: admin
  ansible_ssh_pass: NokiaSrl1!
  ansible_network_os: srlinux # nokia.srlinux.srlinux
  ansible_connection: paramiko
  netlab_console_connection: ssh
  netlab_match_protomap:
    ospf: [ ospfv2, ospfv3 ]
    bgp: [ bgp, bgp-evpn, bgp-ipvpn ]
    connected: [ local ]
    isis: [ isis ]
    static: [ static ]
sr:
  srgb.start: 16000
  srgb.size: 10000
bfd:                                    # SR Linux supports lower BFD timers than the global default
  min_tx: 100
  min_rx: 100
clab:
  image: ghcr.io/nokia/srlinux:26.3.2
  node:
    kind: srl
    type: ixr-d2
    config_templates:
      hosts: /etc/hosts
  interface:
    name: e1-{ifindex}
  group_vars:
    srlinux_grpc_port: 57400
features:
  initial:
    system_mtu: True
    min_mtu: 1436
    max_mtu: 9500
    ipv4:
      unnumbered: True
    ipv6:
      lla: True
    collect: true
    reload: true
  bfd: True
  bgp:
    advertise: true
    local_as: True
    vrf_local_as: True
    local_as_ibgp: True
    activate_af: True
    ipv6_lla: True
    import: [ ospf, isis, connected, static, vrf, no_policy ]
    community:
      standard: [ standard, large ]
      large: [ large ]
      extended: [ extended ]
      2octet: [ standard ]
    default_originate: true
    allowas_in: true
    as_override: true
    password: true
    tcp_ao: false
    timers: true
    remove_private_as: true
    rs_client: true
    bfd: true
    passive: true
    multihop.vrf: true
  evpn:
    irb: True
    asymmetrical_irb: True
    transport: [ vxlan ]
  gateway:
    protocol: [ anycast ]
  isis:
    circuit_type: true
    unnumbered:
      ipv4: True
      ipv6: True
      network: True
    import: [ ospf, bgp, connected, static, vrf, no_policy ]
  mpls:                           # supported on 7250 IXR and 7730 SXR
    ldp: True
    vpn: True
    _platforms: [ ixr-6, ixr-10, ixr-18, ixr-x, sxr- ]
  ospf:
    unnumbered: True
    import: [ bgp, isis, connected, static, vrf, no_policy ]
    default: true
    areas: true
  routing:
    policy:
      match:
        prefix: True
      set: [ locpref, med ]
    prefix: True
    static:
      vrf: True
      discard: True
  sr:
    af: [ ipv4, ipv6 ]
    protocol: [ isis ]
  vlan:
    model: router
    svi_interface_name: "irb0.{vlan}"
    subif_name: "{ifname}.{vlan.access_id}"
    mixed_trunk: True
  vrf:
    keep_module: True
    ospfv2: True
    ospfv3: True
    bgp: True
    isis: True
  vxlan:
    requires: [ evpn ]                  # vrf for l3 vxlan
external:
  image: none
graphite.icon: router
