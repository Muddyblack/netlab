---
description: Extreme EXOS
support:
  level: minimal
interface_name: "{ifindex}"
loopback_interface_name: loopback{ifindex}
ifindex_offset: 1
mgmt_if: Mgmt
role: router
features:
  initial:
    min_mtu: 1500
    max_mtu: 9216
    ra: true
    normalize: true
    collect: true
    reload: false
  ospf:
    loopback:
      passive: true
    priority: true
    timers: true
  vlan:
    model: switch
    svi_interface_name: vlan{vlan}
  gateway:
    protocol: [ vrrp ]

libvirt:
  create_template: exos.xml.j2
  image: netlab/exos
clab:
  build: True
  image: vrnetlab/extreme_exos
  node:
    kind: linux # kind not yet available in Containerlab
  interface:
    name: "eth{ifindex}"
  group_vars:
    ansible_user: vrnetlab
    ansible_ssh_pass: VR-netlab9
    netlab_ready: [ ssh ]
    netlab_check_retries: 40
    netlab_check_delay: 10
group_vars:
  ansible_network_os: exos
  ansible_connection: ansible.netcommon.network_cli
  netlab_console_connection: ssh
  netlab_initial: always
  ansible_user: admin
  ansible_ssh_pass: admin
  netlab_ssh_args: >-
    -o KexAlgorithms=+diffie-hellman-group-exchange-sha1
    -o PubkeyAcceptedKeyTypes=ssh-rsa
    -o HostKeyAlgorithms=+ssh-rsa
external:
  image: none
graphite.icon: switch
