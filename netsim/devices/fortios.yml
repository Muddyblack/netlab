description: Fortinet FortiOS firewall
support:
  level: minimal
  caveats:
  - We don't test Fortinet configurations due to their ridiculous temporary licensing policy
interface_name: port{ifindex}
loopback_interface_name: loopback{ifindex}
loopback: false
mtu: 1500
ifindex_offset: 2
libvirt:
  image: fortinet/fortios
  build: https://netlab.tools/labs/fortios/
  create_template: fortios.xml.j2
  create_iso: fortios
clab:
  node.kind: fortinet_fortigate
  interface.name: "eth{ifindex}"
  image: vrnetlab/vr-fortios:7.4.8
group_vars:
  ansible_user: admin
  ansible_password: admin
  ansible_ssh_pass: admin
  ansible_network_os: fortinet.fortios.fortios
  ansible_connection: httpapi
  collections:
  - fortinet.fortios
  vdom: "root"
  netlab_vdom: "root"
  mgmt_if: port1
  ansible_httpapi_use_ssl: true
  ansible_httpapi_validate_certs: false
  ansible_httpapi_port: 443
  netlab_console_connection: ssh
  netlab_ready: [ ansible ]
  netlab_device_type: fortios
external:
  image: none
features:
  bgp:
    activate_af: true          # Per-neighbor activate / activate6
    advertise: true            # "config network" / "config network6"
    community:                 # FortiOS send-community: standard | extended | both
      standard: [ standard ]
      extended: [ extended ]
    import: [ ospf, connected, static ]
    rs: false
    description: true
    password: true
    timers: true
    passive: true
    gr:                        # No helper-only mode: FortiOS either advertises the full
      valid: [ enable, disable ]   # restart capability or stays silent
  ospf:
    password: true
    priority: true
    timers: true
  routing:
    static:
      discard: true
  initial:
    collect: true
graphite.icon: firewall
